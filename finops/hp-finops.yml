specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: HP
providerId: hp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Device Management
  - Printing
  - PrintOS
description: 'FOCUS-aligned FinOps for HP developer APIs: API access is bundled with HP Active Care
  / Proactive Insights and HP Indigo PrintOS service contracts rather than billed per-call. Cost
  tracking lives at the device-fleet and PrintOS subscription level rather than per-API-request.'
notes: HP does not invoice for API consumption directly; all cost flows through the underlying device-management
  or print-operations service contract.
sources:
  - https://developers.hp.com/
  - https://www.hp.com/us-en/services/active-care.html
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: HP Inc.
serviceCategory: Device Management & Industrial Printing
billingModel:
  pricingCategory: Bundled (Service Contract)
  billingFrequency: Annual / Monthly per HP service contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: HP Developer APIs
  ServiceCategory: Device Management & Industrial Printing
  ProviderName: HP
  PublisherName: HP Inc.
  InvoiceIssuerName: HP Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: enrolled_devices
    description: Devices enrolled in HP Active Care / Proactive Insights; the primary cost dimension
      for the Workforce Solutions Analytics API contract.
    unit: device
    aggregation: max
    dimensions:
      - tenant
      - device_type
      - region
  - name: printos_devices
    description: HP Indigo presses or industrial printers attached to PrintOS.
    unit: device
    aggregation: max
    dimensions:
      - print_shop
      - press_model
  - name: contract_seats
    description: Named-user seats on the HP services contract where applicable.
    unit: seat
    aggregation: max
    dimensions:
      - tenant
      - role
  - name: api_requests
    description: API call volume (Workforce Solutions Analytics + PrintOS Device API). Not directly
      billed but useful for capacity / fair-use monitoring.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - tenant
  - name: device_telemetry
    description: Bytes / events emitted per device into PrintOS or Proactive Insights cloud.
    unit: event
    aggregation: sum
    dimensions:
      - device
principles:
  - name: Visibility
    description: Track device-fleet count and PrintOS press count via the HP services portal; reconcile
      monthly against the HP service contract. API-level visibility comes from your own request logs
      since HP does not surface per-call billing.
  - name: Allocation
    description: Tag devices by business unit, site, and cost center. Allocate the bundled service-contract
      cost across consuming teams pro-rata to enrolled-device count.
  - name: Optimization
    description: Decommission unused devices from Active Care / Proactive Insights enrollment to
      reduce per-device contract cost. Consolidate PrintOS presses under fewer print shops where
      operationally viable. Avoid excessive polling that triggers fair-use throttling.
  - name: Accountability
    description: Assign a contract owner for each HP service line. Review the renewal each year against
      actual device-fleet utilization and API consumption volume.
maintainers:
