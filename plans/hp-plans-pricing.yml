specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: HP
providerId: hp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Computer Hardware
  - Device Management
  - Printing
  - PrintOS
  - TechPulse
description: HP exposes developer APIs through HP Workforce Solutions (formerly TechPulse Analytics)
  for device fleet analytics and HP PrintOS for HP Indigo press / industrial printing customers.
  These APIs are not stand-alone SaaS - access is bundled with the underlying HP service contract
  (HP Active Care / HP Proactive Insights / HP Indigo PrintOS subscription) and authenticated via
  OAuth2 against tenant credentials. HP does not publish a public per-call rate card or developer-tier
  pricing; pricing is part of the device, support, or PrintOS contract negotiated with HP.
notes: HP API access is contract-bundled, not a separately purchasable SaaS tier. Public per-call
  pricing is not published. Plan entries describe the contract-bundled access surface rather than
  list-priced tiers.
sources:
  - https://developers.hp.com/
  - https://developers.hp.com/hp-proactive-insights/api/hp-workforce-solutions-analytics-api
  - https://developers.hp.com/printos-hp-indigo-sdks-and-apis/device-api
plans:
  - id: hp-workforce-solutions
    name: HP Workforce Solutions Analytics API (Bundled)
    type: enterprise
    description: API access for tenants enrolled in HP Active Care / HP Proactive Insights. Included
      with the device-management service contract; no separate API fee published.
    entries:
      - label: Tenant API access
        name: workforce_api_access
        type: subscription
        metric: tenant
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: bundled with HP Active Care / Proactive Insights contract
        userMultiplied: false
    elements:
      - name: OAuth2 tenant authentication
      - name: Fleet analytics for enrolled devices
      - name: Cost optimization and service-management endpoints
      - name: Requires HP Active Care / Proactive Insights subscription
  - id: hp-printos-device
    name: HP PrintOS Device API (Bundled)
    type: enterprise
    description: Device-side API for HP Indigo / industrial print shops to attach equipment to the
      PrintOS Cloud Platform. Bundled with HP Indigo PrintOS subscription.
    entries:
      - label: Device attachment and telemetry
        name: printos_device_access
        type: subscription
        metric: device
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: bundled with HP Indigo PrintOS subscription
        userMultiplied: false
    elements:
      - name: Device provisioning and registration
      - name: Status and telemetry submission
      - name: PrintOS Cloud Platform integration
      - name: Requires HP Indigo / PrintOS contract
  - id: hp-developer-portal
    name: Developer Portal Self-Service
    type: freemium
    description: Documentation and SDK access at developers.hp.com. Free to browse; production access
      requires the underlying contract.
    entries:
      - label: Documentation access
        name: docs_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: API specifications and reference docs
      - name: SDK and sample code downloads
      - name: No production credentials issued without contract
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
