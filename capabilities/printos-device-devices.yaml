naftiko: 1.0.0-alpha2
info:
  label: HP PrintOS Device API — Devices
  description: 'HP PrintOS Device API — Devices. 3 operations. Lead operation: List Devices. Self-contained Naftiko capability
    covering one Hp business surface.'
  tags:
  - Hp
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HP_API_KEY: HP_API_KEY
capability:
  consumes:
  - type: http
    namespace: printos-device-devices
    baseUri: https://printos.api.hp.com
    description: HP PrintOS Device API — Devices business capability. Self-contained, no shared references.
    resources:
    - name: devices
      path: /devices
      operations:
      - name: listdevices
        method: GET
        description: List Devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: provisiondevice
        method: POST
        description: Provision Device
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: devices-deviceId-status
      path: /devices/{deviceId}/status
      operations:
      - name: updatedevicestatus
        method: PUT
        description: Update Device Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deviceId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: printos-device-devices-rest
    port: 8080
    description: REST adapter for HP PrintOS Device API — Devices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/devices
      name: devices
      description: REST surface for devices.
      operations:
      - method: GET
        name: listdevices
        description: List Devices
        call: printos-device-devices.listdevices
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: provisiondevice
        description: Provision Device
        call: printos-device-devices.provisiondevice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/devices/{deviceid}/status
      name: devices-deviceid-status
      description: REST surface for devices-deviceId-status.
      operations:
      - method: PUT
        name: updatedevicestatus
        description: Update Device Status
        call: printos-device-devices.updatedevicestatus
        with:
          deviceId: rest.deviceId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: printos-device-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for HP PrintOS Device API — Devices. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-devices
      description: List Devices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: printos-device-devices.listdevices
      outputParameters:
      - type: object
        mapping: $.
    - name: provision-device
      description: Provision Device
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: printos-device-devices.provisiondevice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-device-status
      description: Update Device Status
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: printos-device-devices.updatedevicestatus
      with:
        deviceId: tools.deviceId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
