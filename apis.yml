  - aid: hp:hp-printos-device-api
    name: HP PrintOS Device API
    description: >-
      The HP PrintOS Device API enables device manufacturers and print shop IT
      developers to attach their devices to the PrintOS Cloud Platform. Once
      provisioned, devices can make secure REST calls to interact with the
      platform APIs to send device status and perform operations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
