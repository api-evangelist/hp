apis:
  - aid: hp:hp-workforce-solutions-analytics-api
    name: HP Workforce Solutions Analytics API
    description: >-
      The HP Workforce Solutions Analytics API (formerly TechPulse Analytics
      API) provides insightful analytics on planning, cost optimization, and
      service management capabilities for devices enrolled in HP Proactive
      Insights. It supports OAuth2 authentication.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.hp.com/hp-proactive-insights/api/hp-workforce-solutions-analytics-api
